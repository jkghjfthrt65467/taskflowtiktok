version: '3.8'

services:
  # خادم معالجة الطلبات
  order-processor:
    build: .
    container_name: order-processor
    ports:
      - "10001:10001"
    environment:
      - DATABASE_URL=postgresql://order_user:order_password@postgres:5432/order_processor_db
      - PORT=10001
      - FLASK_ENV=production
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # قاعدة البيانات PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: order-processor-db
    environment:
      - POSTGRES_USER=order_user
      - POSTGRES_PASSWORD=order_password
      - POSTGRES_DB=order_processor_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - order-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  order-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
